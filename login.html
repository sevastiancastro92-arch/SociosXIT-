        * {

            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --neon-red: #ff073a;
            --neon-orange: #ff8c00;
            --neon-green: #25D366; /* Color de WhatsApp */
            --bg-dark: #05000a;

        body {
            background: radial-gradient(circle at center, #2a0005 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animación de fondo: Líneas de escaneo de error */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 7, 58, 0.03) 0px,
                rgba(255, 7, 58, 0.03) 1px,
                transparent 1px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1;
            animation: scanline 10s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 3rem 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 7, 58, 0.4);
            box-shadow: 0 0 40px rgba(255, 7, 58, 0.15), inset 0 0 20px rgba(255, 140, 0, 0.05);
            text-align: center;
            max-width: 550px;
            width: 90%;
            position: relative;
            z-index: 2;
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .alert-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--neon-red);
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 10px rgba(255, 7, 58, 0.5));
        }

        p.message {
            font-size: 1.1rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .highlight {
            color: white;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 5px;
            border-bottom: 2px solid var(--neon-orange);
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #128C7E, var(--neon-green));
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.7);
            border-color: white;
        }

        /* Destello en el botón */
        .whatsapp-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .wa-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .status-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-dark);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 5px 15px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 7, 58, 0.3);
        }

    </style>
</head>
