<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SociosXIT</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* =========================================
           1. FUENTES Y VARIABLES CYBER-NEÓN
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;500;700&display=swap');

        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
            margin: 0; padding: 0;
        }

        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f2ff;
            --neon-purple: #8a2be2;
            --bg-deep: #0a0a12;
            --text-light: #e0f7fa;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at center, #1a0a2e 0%, var(--bg-deep) 80%);
            color: var(--text-light);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* =========================================
           2. BOTÓN DE AUDIO FLOTANTE
           ========================================= */
        .audio-btn-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        #audioBtn {
            background: rgba(10, 10, 18, 0.8);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #audioBtn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 25px var(--neon-blue);
            background: var(--neon-blue);
            color: #000;
        }

        /* =========================================
           3. FONDOS ÉPICOS: PORTAL CÓSMICO
           ========================================= */
        .cosmic-portal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh; z-index: -1;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; overflow: hidden;
        }
        .magic-ring { position: absolute; border-radius: 50%; mix-blend-mode: screen; }
        .ring-outer { width: 900px; height: 900px; border: 4px dashed rgba(138, 43, 226, 0.4); box-shadow: 0 0 80px rgba(138, 43, 226, 0.6); animation: spinRing 60s linear infinite; }
        .ring-middle { width: 700px; height: 700px; border: 2px solid rgba(0, 242, 255, 0.3); box-shadow: 0 0 50px rgba(0, 242, 255, 0.5); animation: spinRingReverse 30s linear infinite; }
        .ring-inner { width: 550px; height: 550px; border: 6px dotted rgba(255, 0, 127, 0.6); box-shadow: 0 0 60px rgba(255, 0, 127, 0.8); animation: spinRing 20s linear infinite; }
        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0));
            background-size: 200px 200px; animation: twinkle 4s infinite alternate; opacity: 0.5;
        }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        @keyframes spinRingReverse { 100% { transform: rotate(-360deg); } }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }

        /* =========================================
           4. CONTENEDOR PRINCIPAL Y ANIMACIÓN
           ========================================= */
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; z-index: 10; padding: 20px;
        }

        .hex-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin-bottom: 30px; 
            padding: 3px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue), var(--neon-pink));
            border-radius: 25px;
            animation: rotateBorder 5s linear infinite;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
        }

        @keyframes rotateBorder { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .hex-container {
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            text-align: center;
            border-radius: 22px;
            position: relative;
            overflow: hidden;
        }

        .logo {
            width: 90px; height: 90px; object-fit: cover; border-radius: 50%;
            margin: 0 auto 1.5rem auto; display: block;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);
            animation: pulseText 2s infinite alternate;
        }

        h1 {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.8rem;
            margin-bottom: 2rem; color: #fff; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-blue);
            transition: all 0.4s ease;
        }

        /* =========================================
           5. INPUTS Y BOTONES CON OJITO DE CONTRASEÑA
           ========================================= */
        .input-box {
            position: relative;
            margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        input {
            width: 100%; padding: 15px 45px 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; font-family: 'Exo 2', sans-serif; font-size: 1rem;
            outline: none; transition: all 0.3s ease;
            -webkit-user-select: text; user-select: text;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            background: rgba(20, 20, 30, 0.9);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-password:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .reg-wrapper {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }

        .reg-wrapper.active {
            max-height: 200px; 
            opacity: 1;
        }

        #actionBtn {
            width: 100%; padding: 16px; margin-top: 10px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            border: none; border-radius: 12px; color: white;
            font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); letter-spacing: 2px;
        }

        #actionBtn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 30px var(--neon-pink), 0 0 15px var(--neon-blue); }
        #actionBtn:active { transform: scale(0.95); }

        .btn-secondary {
            background: transparent; border: none; color: var(--neon-blue);
            margin-top: 25px; font-size: 0.95rem; cursor: pointer; transition: 0.3s;
            font-family: 'Exo 2', sans-serif; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-secondary:hover { color: #fff; text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }

        .error { color: #ff3333; font-size: 0.85rem; margin: 10px 0; min-height: 20px; font-weight: 700; text-shadow: 0 0 8px rgba(255, 0, 0, 0.8); }

        /* =========================================
           6. COMPONENTES EXTRA (LOADER, ADS, ADBLOCK)
           ========================================= */
        #ads-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; align-items: center; }
        .adsbox { width: 100%; min-height: 50px; background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(0, 242, 255, 0.3); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: rgba(255, 255, 255, 0.3); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; overflow: hidden; padding: 5px; }
        
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 18, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s ease; }
        #loader-overlay.active { opacity: 1; visibility: visible; }
        .loader-atom { position: relative; width: 100px; height: 100px; }
        .orbit { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--neon-blue); border-bottom-color: var(--neon-pink); animation: orbitSpin 1s linear infinite; }
        .orbit:nth-child(2) { transform: rotateX(60deg) rotateY(45deg); animation: orbitSpin2 1.2s linear infinite; border-top-color: var(--neon-purple); border-bottom-color: var(--neon-blue); }
        .orbit:nth-child(3) { transform: rotateX(60deg) rotateY(-45deg); animation: orbitSpin3 1.4s linear infinite; border-top-color: var(--neon-pink); border-bottom-color: var(--neon-purple); }
        .loader-text { margin-top: 30px; font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; letter-spacing: 4px; animation: pulseText 1.5s infinite alternate; }
        @keyframes pulseText { 0% { opacity: 0.5; text-shadow: 0 0 10px var(--neon-blue); } 100% { opacity: 1; text-shadow: 0 0 20px var(--neon-blue), 0 0 30px var(--neon-pink); } }
        
        .adblock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 18, 0.98); backdrop-filter: blur(15px); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .adblock-overlay i { font-size: 5rem; color: var(--neon-pink); margin-bottom: 20px; animation: pulseText 2s infinite; }
        .btn-reload { padding: 15px 35px; background: transparent; border: 2px solid var(--neon-pink); color: white; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-reload:hover { background: var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <!-- Botón Flotante de Audio -->
    <div class="audio-btn-container">
        <button id="audioBtn" title="Activar/Desactivar Sonido">
            <i class='bx bx-volume-full' id="audioIcon"></i>
        </button>
    </div>

    <!-- AdBlock -->
    <div class="adblock-overlay" id="adblockScreen" style="display: none;">
        <i class='bx bx-shield-x'></i>
        <h1 style="font-family: 'Orbitron'; margin-bottom: 10px;">ADBLOCK DETECTADO</h1>
        <p style="color: #ccc; max-width: 450px; margin-bottom: 30px;">Para acceder a SociosXIT, necesitamos que desactives tu bloqueador. Mantenemos esto gracias a la publicidad.</p>
        <button class="btn-reload" onclick="location.reload()">YA LO DESACTIVÉ</button>
    </div>

    <!-- Fondos -->
    <div class="cosmic-portal">
        <div class="stars"></div>
        <div class="magic-ring ring-outer"></div>
        <div class="magic-ring ring-middle"></div>
        <div class="magic-ring ring-inner"></div>
    </div>

    <!-- Loader -->
    <div id="loader-overlay">
        <div class="loader-atom">
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="orbit"></div>
        </div>
        <div class="loader-text" id="loader-msg">AUTENTICANDO...</div>
    </div>

    <div class="main-wrapper">
        <div class="hex-wrapper">
            <div class="hex-container">
                <img src="Logo/SOCIOS INFO 20260417_230028.jpg" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/90/1a0033/00eeff?text=XIT'">
                
                <h1 id="title">Iniciar Sesión</h1>

                <div id="refMessage" style="display: none; color: #00ffcc; font-size: 0.95rem; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 204, 0.8); text-align: center; border: 1px dashed #00ffcc; padding: 12px; border-radius: 8px; background: rgba(0, 255, 204, 0.05); transition: opacity 0.4s ease;">
                </div>
                
                <div class="reg-wrapper" id="regFields">
                    <div class="input-box">
                        <input type="email" id="emailReal" placeholder="Correo Electrónico" autocomplete="off">
                    </div>
                    <div class="input-box">
                        <input type="tel" id="phone" placeholder="Teléfono / WhatsApp" autocomplete="off">
                    </div>
                </div>
                
                <div class="input-box">
                    <input type="text" id="username" placeholder="Usuario" autocomplete="off">
                </div>
                
                <div class="input-box">
                    <input type="password" id="password" placeholder="Contraseña">
                    <i class='bx bx-show toggle-password' id="togglePassword"></i>
                </div>
                
                <p id="msg" class="error"></p>
                
                <button id="actionBtn">Entrar</button>
                <button id="toggleBtn" class="btn-secondary">No tengo cuenta, Registrarme</button>
            </div>
        </div>

        <div id="ads-container">
            <div class="ad-slot adsbox">
                <script type="text/javascript">
                    atOptions = { 'key' : 'cee8e337a4322443b8513b91f8f6f91e', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/cee8e337a4322443b8513b91f8f6f91e/invoke.js"></script>
            </div>
            
            <div class="ad-slot adsbox">
                <script type="text/javascript">
                    atOptions = {'key' : '22131686a5bfbef1dbd17962fb7e46a4', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/22131686a5bfbef1dbd17962fb7e46a4/invoke.js"></script>
            </div>
        </div>
    </div>

    <!-- LOGICA DE INTERFAZ -->
    <script>
        // 1. Detección de AdBlock
        window.addEventListener('load', () => {
            const ad = document.createElement('div');
            ad.className = 'adsbox'; ad.style.height = '1px'; ad.style.width = '1px'; ad.style.position = 'absolute'; ad.style.left = '-1000px';
            document.body.appendChild(ad);
            setTimeout(() => {
                if (ad.offsetHeight === 0) document.getElementById('adblockScreen').style.display = 'flex';
                ad.remove();
            }, 300);
        });

        // 2. Control de Audio con LocalStorage
        const audioBtn = document.getElementById('audioBtn');
        const audioIcon = document.getElementById('audioIcon');
        let isAudioEnabled = localStorage.getItem('audioState') !== 'false'; 

        const updateAudioUI = () => {
            audioIcon.className = isAudioEnabled ? 'bx bx-volume-full' : 'bx bx-volume-mute';
            audioIcon.style.color = isAudioEnabled ? 'var(--neon-blue)' : '#ff3333';
            audioBtn.style.borderColor = isAudioEnabled ? 'var(--neon-blue)' : '#ff3333';
        };
        updateAudioUI();

        audioBtn.addEventListener('click', () => {
            isAudioEnabled = !isAudioEnabled;
            localStorage.setItem('audioState', isAudioEnabled);
            updateAudioUI();
        });

        // 3. Mostrar/Ocultar Contraseña
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('bx-show');
            togglePassword.classList.toggle('bx-hide');
        });
    </script>

    <!-- LOGICA FIREBASE CON SISTEMA DE REFERIDOS Y SMART LINK SEGURO -->
    <script type="module">
        import { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, ref, set, get, child } from './firebase-config.js';

        const userIn = document.getElementById('username');
        const passIn = document.getElementById('password');
        const emailRealIn = document.getElementById('emailReal');
        const phoneIn = document.getElementById('phone');
        
        const actionBtn = document.getElementById('actionBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const title = document.getElementById('title');
        const msg = document.getElementById('msg');
        const regFields = document.getElementById('regFields'); 
        
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderMsg = document.getElementById('loader-msg');
        const refMessage = document.getElementById('refMessage'); 
        
        const audioBienvenida = new Audio('Logo/bienvenida_paisa.wav');
        
        let isLogin = true;

        const urlParams = new URLSearchParams(window.location.search);
        const referrerUid = urlParams.get('ref');
        let referrerName = "";

        if (referrerUid) {
            get(child(ref(db), `users/${referrerUid}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    referrerName = snapshot.val().username || "un Socio";
                    if (!isLogin) {
                        refMessage.innerHTML = `¡Hola! Bienvenido a SociosXIT.<br>Fuiste invitado por <span style="color:var(--neon-pink); font-family:'Orbitron'; font-size:1.1rem;">${referrerName}</span>`;
                    }
                }
            }).catch(e => console.log("Error al consultar patrocinador:", e));

            setTimeout(() => {
                if(isLogin) toggleBtn.click();
            }, 300);
        }

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            
            title.style.opacity = 0;
            refMessage.style.opacity = 0;

            setTimeout(() => {
                title.innerText = isLogin ? "Iniciar Sesión" : "Crear Cuenta";
                actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
                toggleBtn.innerText = isLogin ? "No tengo cuenta, Registrarme" : "Ya tengo cuenta, Iniciar";
                
                if (!isLogin && referrerUid) {
                    refMessage.innerHTML = `¡Hola! Bienvenido a SociosXIT.<br>Fuiste invitado por <span style="color:var(--neon-pink); font-family:'Orbitron'; font-size:1.1rem;">${referrerName || 'un Socio'}</span>`;
                    refMessage.style.display = "block";
                } else {
                    refMessage.style.display = "none";
                }

                title.style.opacity = 1;
                refMessage.style.opacity = 1;
            }, 200);

            msg.innerText = "";

            if (isLogin) {
                regFields.classList.remove('active');
            } else {
                regFields.classList.add('active');
            }
        });

        actionBtn.addEventListener('click', async () => {
            const userRaw = userIn.value.trim();
            const userClean = userRaw.replace(/\s/g, ''); 
            const pass = passIn.value;
            const fakeEmail = `${userClean}@sistema.local`; 
            const emailReal = emailRealIn.value.trim();
            const phone = phoneIn.value.trim();

            // 1. VALIDAMOS CAMPOS PRIMERO ANTES DE HACER NADA
            if(isLogin) {
                if(!userClean || !pass) return msg.innerText = "LLENA USUARIO Y CONTRASEÑA"; 
            } else {
                if(!userClean || !pass || !emailReal || !phone) return msg.innerText = "LLENA TODOS LOS CAMPOS"; 
            }

            // =========================================================================
            // TRUCO ANTI-BLOQUEO: Abrimos una pestaña en blanco INMEDIATAMENTE.
            // Si el login falla, la cerramos sin que el usuario lo note.
            // Si es exitoso, cargamos el Smart Link ahí.
            // =========================================================================
            let adTab = window.open('about:blank', '_blank');

            try {
                actionBtn.innerText = "PROCESANDO...";
                actionBtn.disabled = true;

                // 2. HACEMOS LA AUTENTICACIÓN
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                    if(isAudioEnabled) {
                        audioBienvenida.play().catch(error => console.log("Audio", error));
                    }
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    const uid = userCredential.user.uid;

                    const newUserData = {
                        username: userClean,
                        correoReal: emailReal, 
                        telefono: phone,       
                        balance: 0,          
                        role: 'user',        
                        emailAuth: fakeEmail     
                    };

                    if (referrerUid) newUserData.referredBy = referrerUid;
                    await set(ref(db, 'users/' + uid), newUserData);

                    if (referrerUid) {
                        try { await set(ref(db, `users/${referrerUid}/referrals/${uid}`), true); } 
                        catch(e) { console.log(e); }
                    }
                }

                // 3. LOGIN EXITOSO: Inyectamos el anuncio en la pestaña que preparamos
                if (adTab) {
                    adTab.location.href = "https://thorpejoy.com/kv2bj8yg6z?key=2876b79be2dd47e51d4ae0c52393db77";
                }

                loaderMsg.innerText = isLogin ? "CONECTANDO AL SERVIDOR..." : "CREANDO PERFIL...";
                loaderOverlay.classList.add('active');

                // 4. REDIRIGIMOS LA PESTAÑA ORIGINAL AL DASHBOARD YA LOGUEADO
                setTimeout(() => {
                    const redirectUrl = new URLSearchParams(window.location.search).get('redirect');
                    if (redirectUrl === 'sugerencias.html') {
                        window.location.href = "sugerencias.html";
                    } else {
                        window.location.href = "dashboard.html"; 
                    }
                }, 2000);

            } catch (error) {
                console.error(error);
                
                // 5. ERROR DE LOGIN: Cerramos la pestaña que abrimos, no mostramos anuncio
                if (adTab) adTab.close();

                if (error.code === 'auth/email-already-in-use') msg.innerText = "ESTE NOMBRE DE USUARIO YA EXISTE.";
                else if (error.code === 'auth/weak-password') msg.innerText = "CONTRASEÑA MUY CORTA (MIN 6).";
                else if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') msg.innerText = "USUARIO O CONTRASEÑA INCORRECTOS.";
                else msg.innerText = "ERROR: " + error.code;
                
                actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
                actionBtn.disabled = false;
            }
        });
        
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') actionBtn.click();
        });
    </script>
</body>
</html>
