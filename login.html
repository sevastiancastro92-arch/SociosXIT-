<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SociosXIT</title>
    <style>
        /* =========================================
           1. FUENTES Y VARIABLES CÓSMICAS
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;500;700&display=swap');

        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00eeff;
            --neon-purple: #bc13fe;
            --bg-deep: #030008;
            --text-light: #e0f7fa;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at center, #1a0033 0%, var(--bg-deep) 70%);
            color: var(--text-light);
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* =========================================
           2. FONDOS ÉPICOS: ANILLOS MÁGICOS GIRATORIOS
           ========================================= */
        .cosmic-portal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            overflow: hidden;
        }

        .magic-ring {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
        }

        .ring-outer {
            width: 900px;
            height: 900px;
            border: 4px dashed rgba(188, 19, 254, 0.4);
            box-shadow: 0 0 80px rgba(188, 19, 254, 0.6), inset 0 0 80px rgba(188, 19, 254, 0.4);
            animation: spinRing 60s linear infinite;
        }

        .ring-middle {
            width: 700px;
            height: 700px;
            border: 2px solid rgba(0, 238, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 238, 255, 0.5), inset 0 0 30px rgba(0, 238, 255, 0.3);
            animation: spinRingReverse 30s linear infinite;
        }

        .ring-inner {
            width: 550px;
            height: 550px;
            border: 6px dotted rgba(255, 0, 85, 0.6);
            box-shadow: 0 0 60px rgba(255, 0, 85, 0.8), inset 0 0 40px rgba(255, 0, 85, 0.5);
            animation: spinRing 20s linear infinite;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite alternate;
            opacity: 0.5;
        }

        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        @keyframes spinRingReverse { 100% { transform: rotate(-360deg); } }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }

        /* =========================================
           3. CONTENEDOR PRINCIPAL
           ========================================= */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 10;
            padding: 20px;
        }

        .hex-wrapper {
            position: relative;
            filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.5)) drop-shadow(0 0 40px rgba(255, 0, 85, 0.3));
            animation: hoverFloat 4s ease-in-out infinite;
            width: 100%;
            max-width: 420px;
            margin-bottom: 30px; /* Separación con los anuncios */
        }

        @keyframes hoverFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hex-container {
            background: rgba(10, 2, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            text-align: center;
            clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
            border: 1px solid transparent; 
            position: relative;
        }

        .hex-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--neon-purple), transparent, var(--neon-pink), transparent, var(--neon-blue));
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 6s ease infinite;
        }

        @keyframes borderPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 1.5rem auto;
            display: block;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-blue);
        }

        /* =========================================
           4. INPUTS Y BOTONES
           ========================================= */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.3); }

        input:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4), inset 0 0 10px rgba(255, 0, 85, 0.2);
            transform: scale(1.02);
            background: rgba(20, 0, 10, 0.8);
        }

        .reg-only {
            display: none;
            opacity: 0;
            transform: translateY(-15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #actionBtn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        #actionBtn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: lightSweep 3s infinite;
        }

        @keyframes lightSweep { 0% { left: -100%; } 50%, 100% { left: 200%; } }

        #actionBtn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 0 30px var(--neon-pink), 0 0 10px var(--neon-blue);
        }
        #actionBtn:active { transform: scale(0.95); }

        .btn-secondary {
            background: transparent;
            border: none;
            color: var(--neon-blue);
            margin-top: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Exo 2', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .error {
            color: #ff3333;
            font-size: 0.85rem;
            margin: 10px 0;
            min-height: 20px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* =========================================
           5. CONTENEDOR DE ANUNCIOS (ABAJO)
           ========================================= */
        #ads-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column; /* Cambia a row si quieres anuncios uno al lado del otro */
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        /* Clase de ejemplo para visualizar donde van tus anuncios.
           Tus scripts reemplazarán o se acomodarán aquí dentro */
        .ad-slot {
            width: 100%;
            min-height: 90px; /* Altura estándar de banner */
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(0, 238, 255, 0.3);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* =========================================
           6. PANTALLA DE CARGA ÉPICA
           ========================================= */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 8, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loader-atom { position: relative; width: 100px; height: 100px; }

        .orbit {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-bottom-color: var(--neon-pink);
            animation: orbitSpin 1s linear infinite;
        }

        .orbit:nth-child(2) { transform: rotateX(60deg) rotateY(45deg); animation: orbitSpin2 1.2s linear infinite; border-top-color: var(--neon-purple); border-bottom-color: var(--neon-blue); }
        .orbit:nth-child(3) { transform: rotateX(60deg) rotateY(-45deg); animation: orbitSpin3 1.4s linear infinite; border-top-color: var(--neon-pink); border-bottom-color: var(--neon-purple); }

        .loader-text {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: pulseText 1.5s infinite alternate;
        }

        @keyframes orbitSpin { 100% { transform: rotateZ(360deg); } }
        @keyframes orbitSpin2 { 100% { transform: rotateX(60deg) rotateY(45deg) rotateZ(360deg); } }
        @keyframes orbitSpin3 { 100% { transform: rotateX(60deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div class="cosmic-portal">
        <div class="stars"></div>
        <div class="magic-ring ring-outer"></div>
        <div class="magic-ring ring-middle"></div>
        <div class="magic-ring ring-inner"></div>
    </div>

    <div id="loader-overlay">
        <div class="loader-atom">
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="orbit"></div>
        </div>
        <div class="loader-text" id="loader-msg">AUTENTICANDO...</div>
    </div>

    <div class="main-wrapper">
        
        <div class="hex-wrapper">
            <div class="hex-container">
                <img src="Logo/SOCIOS INFO 20260417_230028.jpg" alt="Logo SociosXIT" class="logo" onerror="this.src='https://via.placeholder.com/90/1a0033/00eeff?text=XIT'">
                
                <h1 id="title">Iniciar Sesión</h1>
                
                <div class="input-box reg-only">
                    <input type="email" id="emailReal" placeholder="Correo Electrónico" autocomplete="off">
                </div>
                
                <div class="input-box reg-only">
                    <input type="tel" id="phone" placeholder="Teléfono / WhatsApp" autocomplete="off">
                </div>
                
                <div class="input-box">
                    <input type="text" id="username" placeholder="Usuario" autocomplete="off">
                </div>
                
                <div class="input-box">
                    <input type="password" id="password" placeholder="Contraseña">
                </div>
                
                <p id="msg" class="error"></p>
                
                <button id="actionBtn">Entrar</button>
                <button id="toggleBtn" class="btn-secondary">No tengo cuenta, Registrarme</button>
            </div>
        </div>

        <div id="ads-container">
            <div class="ad-slot">TU ANUNCIO O SCRIPT AQUÍ</div>
        </div>

    </div>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, ref, set } from './firebase-config.js';

        const userIn = document.getElementById('username');
        const passIn = document.getElementById('password');
        const emailRealIn = document.getElementById('emailReal');
        const phoneIn = document.getElementById('phone');
        
        const actionBtn = document.getElementById('actionBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const title = document.getElementById('title');
        const msg = document.getElementById('msg');
        const regFields = document.querySelectorAll('.reg-only');
        
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderMsg = document.getElementById('loader-msg');
        
        // --- AUDIO DE BIENVENIDA ---
        const audioBienvenida = new Audio('Logo/bienvenida_paisa.wav');
        
        let isLogin = true;

        // Cambiar entre Login y Registro
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? "Iniciar Sesión" : "Crear Cuenta";
            actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
            toggleBtn.innerText = isLogin ? "No tengo cuenta, Registrarme" : "Ya tengo cuenta, Iniciar";
            msg.innerText = "";

            // Ocultar o mostrar los campos extra
            regFields.forEach(field => {
                if (isLogin) {
                    field.style.opacity = '0';
                    field.style.transform = 'translateY(-15px)';
                    setTimeout(() => field.style.display = 'none', 400);
                } else {
                    field.style.display = 'block';
                    setTimeout(() => {
                        field.style.opacity = '1';
                        field.style.transform = 'translateY(0)';
                    }, 10);
                }
            });
        });

        // Lógica Principal
        actionBtn.addEventListener('click', async () => {
            const userRaw = userIn.value.trim();
            const userClean = userRaw.replace(/\s/g, ''); 
            const pass = passIn.value;
            const fakeEmail = `${userClean}@sistema.local`; 

            // Variables para los campos nuevos
            const emailReal = emailRealIn.value.trim();
            const phone = phoneIn.value.trim();

            // Validaciones según el modo
            if(isLogin) {
                if(!userClean || !pass) { 
                    msg.innerText = "LLENA USUARIO Y CONTRASEÑA"; 
                    return; 
                }
            } else {
                if(!userClean || !pass || !emailReal || !phone) { 
                    msg.innerText = "LLENA TODOS LOS CAMPOS"; 
                    return; 
                }
            }

            try {
                actionBtn.innerText = "PROCESANDO...";
                actionBtn.disabled = true;

                if(isLogin) {
                    // Solo usa usuario y contraseña
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                    
                    // --- REPRODUCIR AUDIO SI EL LOGIN ES EXITOSO ---
                    audioBienvenida.play().catch(error => console.log("No se pudo reproducir el audio", error));
                    
                } else {
                    // Crea la cuenta con el correo falso para mantener el login fácil
                    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    const uid = userCredential.user.uid;

                    // Guarda TODOS los datos reales en la base de datos
                    await set(ref(db, 'users/' + uid), {
                        username: userClean,
                        correoReal: emailReal, 
                        telefono: phone,       
                        balance: 0,          
                        role: 'user',        
                        emailAuth: fakeEmail     
                    });
                }

                // Carga Épica
                loaderMsg.innerText = isLogin ? "CONECTANDO AL SERVIDOR..." : "CREANDO PERFIL...";
                loaderOverlay.classList.add('active');

                // Nota: Si tu audio dura más de 2 segundos y quieres que se escuche completo 
                // antes de redirigir, puedes aumentar este número (2000 = 2 segundos).
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 2000);

            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    msg.innerText = "ESTE NOMBRE DE USUARIO YA EXISTE.";
                } else if (error.code === 'auth/weak-password') {
                    msg.innerText = "CONTRASEÑA MUY CORTA (MIN 6).";
                } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg.innerText = "USUARIO O CONTRASEÑA INCORRECTOS.";
                } else {
                    msg.innerText = "ERROR: " + error.code;
                }
                
                actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
                actionBtn.disabled = false;
            }
        });
        
        // Permitir dar ENTER para entrar
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') actionBtn.click();
        });
    </script>
</body>
</html>
