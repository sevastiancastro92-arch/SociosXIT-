<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - LUCK XIT GALAXY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        :root {
            --neon-purple: #bc13fe;
            --neon-red: #ff073a;
            --neon-green: #00ff00;
            --glass-bg: rgba(20, 0, 30, 0.7);
        }

        body {
            background-color: #020005;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(188, 19, 254, 0.3);
            animation: slideIn 0.5s ease-out;
            margin-top: 20px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            background: linear-gradient(90deg, var(--neon-purple), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 5px var(--neon-purple));
        }

        /* --- PESTAÑAS (Filtros) --- */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #aaa;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: rgba(188, 19, 254, 0.2);
            color: #fff;
            text-shadow: 0 0 8px var(--neon-purple);
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.5);
        }

        /* --- LISTA DE HISTORIAL --- */
        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }
        .history-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }

        .history-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            position: relative;
        }

        .history-item.purchase { border-left: 4px solid var(--neon-red); }
        .history-item.recharge { border-left: 4px solid var(--neon-green); }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }

        .item-date {
            font-size: 0.8rem;
            color: #888;
        }

        .item-amount.negative { color: var(--neon-red); text-shadow: 0 0 5px rgba(255,7,58,0.5); font-family: 'Orbitron', sans-serif; font-weight: bold; }
        .item-amount.positive { color: var(--neon-green); text-shadow: 0 0 5px rgba(0,255,0,0.5); font-family: 'Orbitron', sans-serif; font-weight: bold; }

        .item-key {
            background: #000;
            padding: 8px;
            border-radius: 5px;
            font-family: monospace;
            color: var(--neon-purple);
            font-size: 0.9rem;
            margin-top: 10px;
            word-break: break-all;
            border: 1px dashed rgba(188, 19, 254, 0.4);
        }

        .empty-msg {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 20px;
        }

        .back-btn {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }

        .back-btn:hover { 
            border-color: var(--neon-purple); 
            color: white; 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        /* Ajustes Mobile */
        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .tab-btn { font-size: 0.8rem; padding: 8px 5px; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <canvas id="particle-canvas"></canvas>

    <div class="container">
        <h2>REGISTRO DE DATOS</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="setFilter('all', this)">TODO</button>
            <button class="tab-btn" onclick="setFilter('purchase', this)">COMPRAS / KEYS</button>
            <button class="tab-btn" onclick="setFilter('recharge', this)">RECARGAS</button>
        </div>

        <div class="history-list" id="historyContainer">
            <div class="empty-msg">Sincronizando con la red...</div>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">
            VOLVER A LA TIENDA
        </button>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height; let particles = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1; this.vy = (Math.random() - 0.5) * 1;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? 'rgba(255, 7, 58, ' : 'rgba(188, 19, 254, ';
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')'; ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 50; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>

    <script type="module">
        import { auth, db, onAuthStateChanged, ref, get } from './firebase-config.js';

        let allRecords = [];
        let currentFilter = 'all';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await fetchHistoryData(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function fetchHistoryData(uid) {
            const userRef = ref(db, 'users/' + uid);
            
            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const purchases = data.history || {};
                    // Asumimos que las recargas se guardan en el nodo 'recharges' del usuario
                    const recharges = data.recharges || {}; 

                    allRecords = [];

                    // Formatear compras
                    for (let key in purchases) {
                        allRecords.push({
                            id: key,
                            type: 'purchase',
                            title: `Key: ${purchases[key].product}`,
                            amount: purchases[key].price,
                            date: purchases[key].date,
                            secretKey: purchases[key].key
                        });
                    }

                    // Formatear recargas
                    for (let key in recharges) {
                        allRecords.push({
                            id: key,
                            type: 'recharge',
                            title: 'Saldo Agregado',
                            amount: recharges[key].amount,
                            date: recharges[key].date || recharges[key].timestamp, // Depende de cómo lo guardes
                        });
                    }

                    // Ordenar por fecha (más reciente primero)
                    allRecords.sort((a, b) => b.date - a.date);
                    renderHistory();

                } else {
                    document.getElementById('historyContainer').innerHTML = `<div class="empty-msg">No se encontraron registros.</div>`;
                }
            } catch (error) {
                console.error("Error al obtener historial:", error);
                document.getElementById('historyContainer').innerHTML = `<div class="empty-msg" style="color:red;">Error de conexión.</div>`;
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            const filteredRecords = allRecords.filter(record => {
                if (currentFilter === 'all') return true;
                return record.type === currentFilter;
            });

            if (filteredRecords.length === 0) {
                container.innerHTML = `<div class="empty-msg">No hay movimientos en esta categoría.</div>`;
                return;
            }

            filteredRecords.forEach(record => {
                const dateObj = new Date(record.date);
                const dateString = dateObj.toLocaleDateString('es-ES') + ' ' + dateObj.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                
                const isPurchase = record.type === 'purchase';
                const amountClass = isPurchase ? 'negative' : 'positive';
                const amountPrefix = isPurchase ? '-' : '+';
                
                let html = `
                    <div class="history-item ${record.type}">
                        <div class="item-header">
                            <span class="item-title">${record.title}</span>
                            <span class="item-amount ${amountClass}">${amountPrefix}$${record.amount}</span>
                        </div>
                        <div class="item-date">${dateString}</div>
                `;

                if (isPurchase && record.secretKey) {
                    html += `<div class="item-key">${record.secretKey}</div>`;
                }

                html += `</div>`;
                container.innerHTML += html;
            });
        }

        // Función global para los botones de pestañas
        window.setFilter = (filterType, btnElement) => {
            currentFilter = filterType;
            
            // Actualizar clases de los botones
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            renderHistory();
        };
    </script>
</body>
</html>
