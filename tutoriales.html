<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutoriales - LUCK XIT OFC</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;user-select:none;}

:root{
--neon-cyan:#00f3ff;
--neon-purple:#bc13fe;
--bg:#020005;
}

body{
background:var(--bg);
color:white;
font-family:'Poppins';
overflow-x:hidden;
}

/* FONDO */
#particle-canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-1;
}

/* HEADER */
.header-title{
font-family:'Orbitron';
text-align:center;
margin:40px 0 10px;
font-size:2rem;
background:linear-gradient(90deg,var(--neon-cyan),#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeDown 1s ease;
}

/* BUSCADOR */
.search-box{
width:90%;
max-width:600px;
margin:20px auto;
display:flex;
align-items:center;
background:rgba(0,0,0,0.6);
border:1px solid var(--neon-cyan);
border-radius:10px;
padding:10px;
backdrop-filter:blur(10px);
box-shadow:0 0 10px rgba(0,243,255,.3);
animation:fadeUp 1s ease;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:14px;
padding-left:10px;
}

.search-box i{
color:var(--neon-cyan);
font-size:18px;
}

/* CONTENEDOR */
.tutorials-container{
width:95%;
max-width:800px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
padding-bottom:40px;
}

/* TARJETAS */
.tutorial-card{
position:relative;
border-radius:15px;
padding:20px;
overflow:hidden;
opacity:0;
transform:translateY(30px);
animation:cardEnter .6s forwards;
text-align: center; /* Centrar elementos internos */
}

/* EFECTO GIRATORIO */
.tutorial-card::after{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:conic-gradient(
transparent,
rgba(0,243,255,0.25),
transparent,
rgba(188,19,254,0.25),
transparent
);
animation:rotateGlow 6s linear infinite;
z-index:0;
}

/* CAPA OSCURA */
.tutorial-card::before{
content:"";
position:absolute;
inset:2px;
background:rgba(15,0,25,0.9);
border-radius:15px;
z-index:1;
}

/* CONTENIDO ENCIMA */
.tutorial-card > *{
position:relative;
z-index:2;
}

/* HOVER */
.tutorial-card:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 20px rgba(0,243,255,.3);
}

/* TITULO */
.tutorial-title{
font-family:'Orbitron';
color:var(--neon-cyan);
display:flex;
justify-content: center;
gap:10px;
margin-bottom:15px;
}

/* IMAGEN DEL LOGO EN CIRCULO BONITO */
.tutorial-logo {
width: 90px;
height: 90px;
border-radius: 50%;
object-fit: cover;
border: 2px solid var(--neon-cyan);
box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
margin: 0 auto 15px auto;
display: block;
}

/* DESC */
.tutorial-desc{
font-size:13px;
color:#ccc;
background:rgba(0,0,0,.4);
padding:10px;
border-radius:8px;
margin-bottom:15px;
border-left:3px solid var(--neon-purple);
text-align: left; /* Mantener descripcion justificada a la izquierda */
}

/* BOTON */
.btn-download{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:12px;
border-radius:10px;
border:1px solid var(--neon-cyan);
color:var(--neon-cyan);
text-decoration:none;
font-family:'Orbitron';
transition:.3s;
}

.btn-download:hover{
background:var(--neon-cyan);
color:#000;
box-shadow:0 0 20px var(--neon-cyan);
}

/* BOTON ATRAS */
.back-btn{
position:fixed;
top:20px;
left:20px;
color:var(--neon-cyan);
font-size:20px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
border:1px solid var(--neon-cyan);
transition:.3s;
z-index:10;
}

.back-btn:hover{
background:var(--neon-cyan);
color:#000;
}

/* ANIMACIONES */
@keyframes fadeDown{
from{opacity:0;transform:translateY(-30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes cardEnter{
to{opacity:1;transform:translateY(0);}
}

@keyframes rotateGlow{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<canvas id="particle-canvas"></canvas>

<a href="dashboard.html" class="back-btn">
<i class='bx bx-arrow-back'></i>
</a>

<h1 class="header-title">
<i class='bx bx-book-reader'></i> Tutoriales Oficiales
</h1>

<div class="search-box">
<i class='bx bx-search'></i>
<input type="text" id="searchInput" placeholder="Buscar tutorial...">
</div>

<div class="tutorials-container" id="tutorialsList">
<p style="text-align:center;color:var(--neon-cyan);font-family:Orbitron;">Cargando...</p>
</div>

<script type="module">
import { db, ref, get } from './firebase-config.js';

let allTutorials = [];

async function loadTutorials(){
const container = document.getElementById('tutorialsList');

try{
const snap = await get(ref(db,'tutorials'));

if(!snap.exists()){
container.innerHTML="<p style='text-align:center;'>No hay tutoriales disponibles en este momento.</p>";
return;
}

allTutorials=[];
snap.forEach(child=>{
allTutorials.push({id:child.key,...child.val()});
});

allTutorials.sort((a,b)=>b.timestamp-a.timestamp);

renderTutorials(allTutorials);

}catch(e){
container.innerHTML="<p style='text-align:center; color:red;'>Error al cargar los datos.</p>";
}
}

function renderTutorials(list){
const container = document.getElementById('tutorialsList');
container.innerHTML="";

list.forEach((data,i)=>{
let desc = data.description ? `<div class="tutorial-desc">${data.description}</div>`:"";
let logoHtml = data.logo ? `<img src="${data.logo}" class="tutorial-logo" alt="Logo de Tutorial">` : "";

container.innerHTML += `
<div class="tutorial-card" style="animation-delay:${i*0.1}s">
<h2 class="tutorial-title">
<i class='bx bxs-file'></i> ${data.title}
</h2>
${logoHtml}
${desc}
<a href="${data.link}" target="_blank" class="btn-download">
<i class='bx bx-download'></i> DESCARGAR
</a>
</div>
`;
});
}

document.getElementById('searchInput').addEventListener('input',e=>{
const value = e.target.value.toLowerCase();

const filtered = allTutorials.filter(t =>
t.title.toLowerCase().includes(value) ||
(t.description && t.description.toLowerCase().includes(value))
);

renderTutorials(filtered);
});

loadTutorials();

/* PARTICULAS */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

class P{
constructor(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.vx=(Math.random()-0.5)*0.7;
this.vy=(Math.random()-0.5)*0.7;
this.size=Math.random()*2+1;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="rgba(0,243,255,0.5)";
ctx.fill();
}
update(){
this.x+=this.vx;
this.y+=this.vy;

if(this.x<0||this.x>w)this.vx*=-1;
if(this.y<0||this.y>h)this.vy*=-1;
}
}

for(let i=0;i<60;i++)particles.push(new P());

function anim(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{p.update();p.draw();});
requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
