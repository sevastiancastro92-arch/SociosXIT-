<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbloqueando Enlace...</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');
        * { box-sizing: border-box; }
        body { background-color: #020005; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; }
        
        .ad-container { width: 90%; max-width: 728px; height: 90px; background: #111; border: 1px dashed #333; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #555; }
        
        .timer-box { font-family: 'Orbitron'; font-size: 3rem; color: #00f3ff; text-shadow: 0 0 15px rgba(0,243,255,0.5); margin: 30px 0; }
        
        .btn-continue { padding: 15px 40px; background: rgba(0,243,255,0.1); border: 1px solid #00f3ff; border-radius: 12px; color: #00f3ff; font-weight: bold; font-family: 'Orbitron'; font-size: 1.2rem; cursor: not-allowed; opacity: 0.5; transition: 0.3s; }
        .btn-continue.active { background: #00f3ff; color: #000; cursor: pointer; opacity: 1; box-shadow: 0 0 20px #00f3ff; }

        /* AD-BLOCKER SCREEN */
        .adblock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020005; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .adblock-overlay i { font-size: 5rem; color: #ff073a; margin-bottom: 20px; text-shadow: 0 0 20px #ff073a; }
        .adblock-overlay h1 { font-family: 'Orbitron'; color: white; margin-bottom: 10px; }
        .adblock-overlay p { color: #aaa; max-width: 400px; margin-bottom: 20px; }
        .btn-reload { padding: 12px 25px; background: #ff073a; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Poppins'; }
    </style>
</head>
<body>

    <div class="adblock-overlay" id="adblockScreen" style="display: none;">
        <i class='bx bx-shield-x'></i>
        <h1>ADBLOCK DETECTADO</h1>
        <p>Para acceder al archivo, necesitamos que desactives tu bloqueador de anuncios. Nuestros creadores mantienen este servicio gracias a la publicidad.</p>
        <button class="btn-reload" onclick="location.reload()">Ya lo desactivé</button>
    </div>

    <h2>Preparando tu enlace...</h2>
    
    <div class="ad-container adsbox">
        ESPACIO PARA ANUNCIO 1 (Pega aquí el código de tu red publicitaria)
    </div>

    <div class="timer-box" id="timer">15</div>

    <button class="btn-continue" id="btnContinue" disabled>ESPERA...</button>

    <div class="ad-container adsbox">
        ESPACIO PARA ANUNCIO 2
    </div>

    <script type="module">
        import { db, ref, get, update, increment } from './firebase-config.js';

        const REWARD_AMOUNT = 0.005; // Ajusta el pago real por vista aquí
        let targetUrl = "";
        let linkOwnerId = "";
        let isValidated = false;

        // 1. Detectar AdBlocker creando un elemento trampa
        function checkAdBlock() {
            const ad = document.createElement('div');
            ad.className = 'adsbox';
            ad.style.height = '1px';
            ad.style.width = '1px';
            ad.style.position = 'absolute';
            ad.style.left = '-1000px';
            document.body.appendChild(ad);
            
            setTimeout(() => {
                const isBlocked = ad.offsetHeight === 0;
                ad.remove();
                if (isBlocked) {
                    document.getElementById('adblockScreen').style.display = 'flex';
                } else {
                    startTimer();
                }
            }, 300);
        }

        // 2. Extraer datos del enlace desde Firebase
        async function loadLinkData() {
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('l');
            
            if (!linkId) {
                document.body.innerHTML = "<h2 style='color:red;'>Enlace Inválido</h2>";
                return;
            }

            try {
                const linkSnap = await get(ref(db, `monetized_links/${linkId}`));
                if (linkSnap.exists()) {
                    const data = linkSnap.val();
                    targetUrl = data.target;
                    linkOwnerId = data.owner;
                    checkAdBlock(); // Solo iniciar si el link existe
                } else {
                    document.body.innerHTML = "<h2 style='color:red;'>Enlace no encontrado o eliminado.</h2>";
                }
            } catch (e) {
                console.error(e);
            }
        }

        // 3. Temporizador y activación del botón
        function startTimer() {
            let timeLeft = 15; // Segundos obligatorios
            const timerDisplay = document.getElementById('timer');
            const btn = document.getElementById('btnContinue');

            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "0";
                    btn.innerText = "CONTINUAR AL ARCHIVO";
                    btn.classList.add('active');
                    btn.removeAttribute('disabled');
                    isValidated = true;
                }
            }, 1000);
        }

        // 4. Procesar click, dar recompensa y redirigir
        document.getElementById('btnContinue').addEventListener('click', async () => {
            if (!isValidated) return;
            
            const btn = document.getElementById('btnContinue');
            btn.innerText = "REDIRIGIENDO...";
            btn.classList.remove('active');

            try {
                const updates = {};
                // Sumar visita al link
                const urlParams = new URLSearchParams(window.location.search);
                updates[`monetized_links/${urlParams.get('l')}/views`] = increment(1);
                
                // Sumar saldo al dueño (ADVERTENCIA: Para producción masiva, esto debe ir en backend)
                updates[`users/${linkOwnerId}/balance`] = increment(REWARD_AMOUNT);

                await update(ref(db), updates);
                
                // Redirigir al archivo
                window.location.href = targetUrl;
            } catch (e) {
                console.error("Error validando click:", e);
                window.location.href = targetUrl; // Redirige igual para no penalizar al visitante
            }
        });

        // Iniciar flujo
        loadLinkData();
    </script>
</body>
</html>
