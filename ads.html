<body>

    <button class="btn-continue" id="btnContinue" disabled><i class='bx bx-time'></i> ESPERA...</button>

    <div class="ad-container adsbox">
        <script type="text/javascript">
            atOptions = {'key' : '22131686a5bfbef1dbd17962fb7e46a4', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {}};

    <script type="module">
        import { db, ref, get, update } from './firebase-config.js';

        // PAGO: 4.00 / 1000 = 0.004 USD por persona que complete los 3 pasos
        const REWARD_PER_COMPLETION = 0.004; 
        const SECONDS_PER_STEP = 10; 
        const TOTAL_STEPS = 3;

        let currentStep = 1;
        let targetUrl = "";
        let linkOwnerId = "";
        let isValidated = false;
        let currentViews = 0;
        let currentInterval = null;

        // DETECTOR DE ADBLOCK REFORZADO (Ejecuta una función de callback si está limpio)
        function checkAdBlock(callback) {
            const testAd = document.createElement('div');
            testAd.innerHTML = '&nbsp;';
            testAd.className = 'adsbox ad-unit ad-zone ads-google publicidade';
            testAd.style.position = 'absolute';
            testAd.style.left = '-9999px';
            document.body.appendChild(testAd);
            
            window.setTimeout(() => {
                const isBlocked = (testAd.offsetHeight === 0 || window.getComputedStyle(testAd).display === 'none');
                testAd.remove();
                
                if (isBlocked) {
                    // Si detecta AdBlock, congela temporizadores y muestra pantalla roja
                    if (currentInterval) clearInterval(currentInterval);
                    document.getElementById('adblockScreen').style.display = 'flex';
                } else {
                    // Si todo está bien, continúa con el proceso
                    if (callback) callback();
                }
            }, 400);
        }

        async function loadLinkData() {
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('l');
            
            if (!linkId) {
                document.getElementById('linkNameDisplay').innerText = "Enlace Inválido";
                return;
            }

            try {
                const linkSnap = await get(ref(db, `monetized_links/${linkId}`));
                if (linkSnap.exists()) {
                    const data = linkSnap.val();
                    targetUrl = data.target;
                    linkOwnerId = data.owner;
                    currentViews = data.views || 0; 
                    
                    document.getElementById('linkNameDisplay').innerHTML = `<i class='bx bx-file'></i> ${data.name || 'Archivo Protegido'}`;
                    
                    // Primera validación al entrar a la página
                    checkAdBlock(startTimer);
                } else {
                    document.getElementById('linkNameDisplay').innerText = "El enlace no existe.";
                }
            } catch (e) {
                document.getElementById('linkNameDisplay').innerText = "Error de conexión.";
            }
        }

        function startTimer() {
            let timeLeft = SECONDS_PER_STEP; 
            const timerDisplay = document.getElementById('timer');
            const btn = document.getElementById('btnContinue');
            
            document.getElementById('stepDisplay').innerText = `PASO ${currentStep} DE ${TOTAL_STEPS}`;
            timerDisplay.innerText = timeLeft;
            
            btn.disabled = true;
            btn.classList.remove('active');
            btn.innerHTML = `<i class='bx bx-time'></i> ESPERA...`;

            if (currentInterval) clearInterval(currentInterval);

            currentInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(currentInterval);
                    timerDisplay.innerText = "0";
                    btn.removeAttribute('disabled');
                    btn.classList.add('active');
                    
                    if (currentStep < TOTAL_STEPS) {
                        btn.innerHTML = `CONTINUAR PASO ${currentStep + 1} <i class='bx bx-right-arrow-alt'></i>`;
                    } else {
                        btn.innerHTML = `OBTENER ARCHIVO <i class='bx bx-download'></i>`;
                    }
                    isValidated = true;
                }
            }, 1000);
        }

        document.getElementById('btnContinue').addEventListener('click', () => {
            if (!isValidated) return;
            
            // Re-validar AdBlock cada vez que hacen clic para avanzar de paso
            checkAdBlock(async () => {
                if (currentStep < TOTAL_STEPS) {
                    currentStep++;
                    isValidated = false;
                    window.scrollTo(0, 0);
                    startTimer();
                    return;
                }

                // FINAL: Pagar al socio y redirigir
                const btn = document.getElementById('btnContinue');
                btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> VALIDANDO...";
                btn.classList.remove('active');

                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const linkId = urlParams.get('l');
                    
                    const updates = {};
                    updates[`monetized_links/${linkId}/views`] = currentViews + 1;

                    const userSnap = await get(ref(db, `users/${linkOwnerId}`));
                    if (userSnap.exists()) {
                        let balanceActual = parseFloat(userSnap.val().balance) || 0;
                        updates[`users/${linkOwnerId}/balance`] = balanceActual + REWARD_PER_COMPLETION;
                    }

                    await update(ref(db), updates);
                    window.location.href = targetUrl;
                } catch (e) {
                    window.location.href = targetUrl; 
                }
            });
        });

        loadLinkData();
    </script>
