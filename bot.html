<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincular Telegram - LUCK XIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

        * { 
            user-select: none; 
            box-sizing: border-box; 
            outline: none;
        }

        :root { 
            --neon-purple: #bc13fe; 
            --neon-blue: #00d2d3; 
            --glass-bg: rgba(15, 0, 25, 0.75); 
            --bg-color: #05000a;
        }

        body {
            background: radial-gradient(circle at center, #1a0033 0%, var(--bg-color) 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animación de escaneo de fondo sutil */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 210, 211, 0.03) 3px, rgba(0, 210, 211, 0.03) 3px);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            padding: 2.5rem; 
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.15), inset 0 0 20px rgba(0, 210, 211, 0.05);
            width: 90%; 
            max-width: 500px;
            border: 1px solid rgba(0, 210, 211, 0.3);
            text-align: center; 
            position: relative;
            animation: float 6s ease-in-out infinite, glowBox 4s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes glowBox {
            from { border-color: rgba(188, 19, 254, 0.3); box-shadow: 0 0 20px rgba(188, 19, 254, 0.1); }
            to { border-color: rgba(0, 210, 211, 0.5); box-shadow: 0 0 30px rgba(0, 210, 211, 0.2); }
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px; 
            filter: drop-shadow(0 0 8px rgba(0, 210, 211, 0.5));
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        input {
            width: 100%; 
            padding: 16px; 
            border-radius: 12px;
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; 
            text-align: center; 
            font-family: 'Orbitron'; 
            font-size: 1.2rem;
            user-select: text;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 211, 0.4), inset 0 0 10px rgba(0, 210, 211, 0.1);
            transform: scale(1.02);
        }

        .btn-auth {
            position: relative;
            padding: 16px; 
            background: linear-gradient(135deg, #1a0033, #001a1a);
            border: 2px solid var(--neon-purple); 
            border-radius: 12px; 
            color: white; 
            font-weight: bold;
            cursor: pointer; 
            transition: 0.3s ease; 
            font-family: 'Orbitron'; 
            letter-spacing: 2px;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn-auth:hover { 
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border-color: transparent;
            box-shadow: 0 0 20px var(--neon-purple); 
            transform: translateY(-2px);
        }

        /* Destello pasando por el botón */
        .btn-auth::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; 
            width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            animation: btnShine 4s infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* Lista de IDs */
        .section-title {
            text-align: left; 
            font-family:'Orbitron'; 
            font-size: 0.9rem; 
            color: var(--neon-blue); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .id-list { 
            text-align: left; 
            max-height: 250px; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        
        /* Custom Scrollbar */
        .id-list::-webkit-scrollbar { width: 6px; }
        .id-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .id-list::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }

        .id-item {
            background: rgba(0, 0, 0, 0.4); 
            border-left: 4px solid #0088cc;
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 8px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: all 0.3s;
        }

        .id-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
            border-left-color: var(--neon-blue);
        }

        .item-info strong { 
            font-family: 'Orbitron'; 
            font-size: 1rem; 
            letter-spacing: 1px;
        }

        .badge-tg { 
            background: rgba(0, 136, 204, 0.2); 
            color: #00d2d3;
            border: 1px solid #0088cc;
            font-size: 0.65rem; 
            padding: 3px 8px; 
            border-radius: 12px; 
            text-transform: uppercase; 
            margin-left: 10px; 
            letter-spacing: 1px;
        }

        .btn-remove { 
            background: transparent; 
            border: 1px solid #ff073a; 
            padding: 8px 12px; 
            color: #ff073a; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }
        
        .btn-remove:hover {
            background: #ff073a;
            color: white;
            box-shadow: 0 0 15px rgba(255, 7, 58, 0.5);
        }

        /* Loader Épico */
        #loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
            border-radius: 20px;
            justify-content: center; align-items: center; flex-direction: column; z-index: 100;
        }

        .dual-spinner {
            width: 60px; height: 60px;
            border: 4px solid transparent;
            border-top-color: var(--neon-purple);
            border-bottom-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            position: relative;
        }

        .dual-spinner::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 4px solid transparent;
            border-left-color: var(--neon-blue);
            border-right-color: var(--neon-purple);
            border-radius: 50%;
            animation: spinReverse 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spinReverse { to { transform: rotate(-360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .back-btn { 
            margin-top: 25px; 
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: #aaa; 
            width: 100%; 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 10px; 
            font-family: 'Poppins';
            transition: 0.3s;
        }

        .back-btn:hover {
            border-color: white;
            color: white;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader">
            <div class="dual-spinner"></div>
            <p id="loaderText" style="color: var(--neon-blue); margin-top: 20px; font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;"></p>
        </div>

        <h2>SISTEMA CORE</h2>
        <p class="subtitle">ENLACE DIRECTO DE TELEGRAM</p>

        <div class="input-group">
            <input type="text" id="deviceId" placeholder="Ingresa tu ID de Telegram" autocomplete="off">
            <button class="btn-auth" onclick="handleAuthorize()">VINCULAR NODO</button>
        </div>

        <div class="section-title">NODOS ACTIVOS</div>
        
        <div class="id-list" id="deviceList">
            <p style="text-align:center; color:#555; font-style: italic;">Escaneando red de nodos...</p>
        </div>

        <button class="back-btn" onclick="window.location.href='dashboard.html'">FINALIZAR CONEXIÓN (VOLVER)</button>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, ref, set, get } from './firebase-config.js';

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadDevices();
            } else {
                window.location.href = "login.html";
            }
        });

        const showLoad = (txt) => {
            document.getElementById('loaderText').innerText = txt;
            document.getElementById('loader').style.display = 'flex';
        };
        const hideLoad = () => document.getElementById('loader').style.display = 'none';

        // AUTORIZAR TELEGRAM
        window.handleAuthorize = async () => {
            const id = document.getElementById('deviceId').value.trim();

            if(!id) return alert("Error: ID de Telegram requerido.");

            showLoad("ESTABLECIENDO ENLACE...");

            setTimeout(async () => {
                try {
                    const dbPath = `telegram_auth/${id}`;
                    
                    // 1. Mapeo General (Exclusivo Telegram)
                    await set(ref(db, dbPath), currentUser.uid);
                    
                    // 2. Registro en el usuario
                    await set(ref(db, `users/${currentUser.uid}/linked_devices/${id}`), {
                        type: 'telegram',
                        date: Date.now()
                    });

                    document.getElementById('deviceId').value = "";
                    hideLoad();
                    loadDevices();
                } catch(e) {
                    alert("Falla crítica en la conexión del nodo.");
                    hideLoad();
                }
            }, 1800);
        };

        // REVOCAR TELEGRAM
        window.removeDevice = async (id) => {
            showLoad("CORTANDO CONEXIÓN...");
            const dbPath = `telegram_auth/${id}`;
            
            setTimeout(async () => {
                await set(ref(db, dbPath), null);
                await set(ref(db, `users/${currentUser.uid}/linked_devices/${id}`), null);
                hideLoad();
                loadDevices();
            }, 1200);
        };

        // CARGAR LISTA
        window.loadDevices = async () => {
            const container = document.getElementById('deviceList');
            try {
                const snapshot = await get(ref(db, `users/${currentUser.uid}/linked_devices`));
                container.innerHTML = "";

                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        const id = child.key;
                        const data = child.val();

                        // Como ahora todo es Telegram, no necesitamos validar el tipo
                        container.innerHTML += `
                            <div class="id-item">
                                <div class="item-info">
                                    <strong style="color:white">${id}</strong>
                                    <span class="badge-tg">TG-NODE</span>
                                </div>
                                <button class="btn-remove" onclick="removeDevice('${id}')">✖</button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center; color:#555; padding: 20px 0;'>Sin conexiones establecidas.</p>";
                }
            } catch(e) { 
                container.innerHTML = "<p style='color:#ff073a; text-align:center;'>Error en lectura de datos.</p>"; 
            }
        };
    </script>
</body>
</html>
