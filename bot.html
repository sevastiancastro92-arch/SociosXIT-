<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincular Dispositivos - LUCK XIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

        * { user-select: none; box-sizing: border-box; }
        :root { --neon-purple: #bc13fe; --neon-blue: #00d2d3; --neon-green: #25D366; --glass-bg: rgba(20, 0, 30, 0.7); }

        body {
            background-color: #020005; color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            padding: 2rem; border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 210, 211, 0.2);
            width: 90%; max-width: 500px;
            border: 1px solid rgba(188, 19, 254, 0.3);
            text-align: center; position: relative;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        /* Selector de Tipo */
        .type-selector {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        select {
            width: 100%; padding: 12px; border-radius: 10px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--neon-purple);
            color: white; font-family: 'Orbitron'; cursor: pointer;
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        input {
            width: 100%; padding: 15px; border-radius: 10px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue);
            color: #fff; text-align: center; font-family: 'Orbitron'; font-size: 1.1rem;
            user-select: text;
        }

        .btn-auth {
            padding: 15px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none; border-radius: 10px; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-family: 'Orbitron'; letter-spacing: 1px;
        }
        .btn-auth:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon-purple); }

        /* Lista */
        .id-list { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .id-item {
            background: rgba(255,255,255,0.05); border-left: 4px solid var(--neon-blue);
            padding: 15px; margin-bottom: 10px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.5s ease;
        }
        .item-info strong { font-family: 'Orbitron'; font-size: 0.9rem; }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; margin-left: 5px; }
        .badge-tg { background: #0088cc; }
        .badge-wa { background: #25D366; }

        .btn-remove { background: #ff073a; border: none; padding: 8px 12px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Loader */
        #loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); border-radius: 20px;
            justify-content: center; align-items: center; flex-direction: column; z-index: 100;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,210,211,0.2); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #444; color: #888; width: 100%; padding: 12px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader">
            <div class="spinner"></div>
            <p id="loaderText" style="color: var(--neon-blue); margin-top: 15px; font-family: 'Orbitron'; font-size: 0.8rem;"></p>
        </div>

        <h2>CONEXIÓN SUPREMA</h2>
        
        <div class="type-selector">
            <select id="deviceType">
                <option value="telegram">TELEGRAM (ID)</option>
                <option value="whatsapp">WHATSAPP (Número)</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="deviceId" placeholder="Ingresa ID o Número">
            <button class="btn-auth" onclick="handleAuthorize()">VINCULAR AHORA</button>
        </div>

        <h3 style="text-align: left; font-family:'Orbitron'; font-size: 0.9rem; color: var(--neon-purple); border-bottom: 1px solid #333; padding-bottom: 8px;">Mis Vínculos Activos</h3>
        
        <div class="id-list" id="deviceList">
            <p style="text-align:center; color:#444;">Buscando en la red...</p>
        </div>

        <button class="back-btn" onclick="window.location.href='dashboard.html'">VOLVER AL PANEL</button>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, ref, set, get } from './firebase-config.js';

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadDevices();
            } else {
                window.location.href = "login.html";
            }
        });

        const showLoad = (txt) => {
            document.getElementById('loaderText').innerText = txt;
            document.getElementById('loader').style.display = 'flex';
        };
        const hideLoad = () => document.getElementById('loader').style.display = 'none';

        // AUTORIZAR
        window.handleAuthorize = async () => {
            const id = document.getElementById('deviceId').value.trim();
            const type = document.getElementById('deviceType').value;

            if(!id) return alert("Ingresa un dato válido");

            showLoad("SINCRONIZANDO CON LUCK XIT GALAXY...");

            setTimeout(async () => {
                try {
                    const dbPath = type === 'telegram' ? `telegram_auth/${id}` : `whatsapp_auth/${id}`;
                    
                    // 1. Mapeo General
                    await set(ref(db, dbPath), currentUser.uid);
                    
                    // 2. Registro en el usuario
                    await set(ref(db, `users/${currentUser.uid}/linked_devices/${id}`), {
                        type: type,
                        date: Date.now()
                    });

                    document.getElementById('deviceId').value = "";
                    hideLoad();
                    loadDevices();
                } catch(e) {
                    alert("Error de conexión");
                    hideLoad();
                }
            }, 1800);
        };

        // REVOCAR
        window.removeDevice = async (id, type) => {
            showLoad("ELIMINANDO ACCESO...");
            const dbPath = type === 'telegram' ? `telegram_auth/${id}` : `whatsapp_auth/${id}`;
            
            setTimeout(async () => {
                await set(ref(db, dbPath), null);
                await set(ref(db, `users/${currentUser.uid}/linked_devices/${id}`), null);
                hideLoad();
                loadDevices();
            }, 1000);
        };

        // CARGAR LISTA
        window.loadDevices = async () => {
            const container = document.getElementById('deviceList');
            try {
                const snapshot = await get(ref(db, `users/${currentUser.uid}/linked_devices`));
                container.innerHTML = "";

                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        const id = child.key;
                        const data = child.val();
                        const isTG = data.type === 'telegram';

                        container.innerHTML += `
                            <div class="id-item" style="border-color: ${isTG ? '#0088cc' : '#25D366'}">
                                <div class="item-info">
                                    <strong style="color:white">${id}</strong>
                                    <span class="badge ${isTG ? 'badge-tg' : 'badge-wa'}">${data.type}</span>
                                </div>
                                <button class="btn-remove" onclick="removeDevice('${id}', '${data.type}')">✖</button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center; color:#555;'>No hay dispositivos.</p>";
                }
            } catch(e) { container.innerHTML = "Error al cargar."; }
        };
    </script>
</body>
</html>
